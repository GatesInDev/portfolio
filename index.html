<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | Vitor</title>
    <meta name="description" content="Development and UI/UX Portfolio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="app">
        <nav class="app-nav">
            <div class="nav-content">
                <a href="#home" class="nav-link active" data-target="home">Home</a>
                <a href="#dotnet" class="nav-link" data-target="dotnet">.NET</a>
                <a href="#other" class="nav-link" data-target="other">Languages</a>
                <a href="#design" class="nav-link" data-target="design">Design</a>
            </div>
        </nav>

        <main id="main-content">
            <!-- Dynamic Content Will Be Injected Here -->
        </main>
    </div>

    <!-- Templates for Views -->
    <template id="home-template">
        <section class="view home-view">
            <div class="hero">
                <h1 class="fade-in">Hi, I'm Vitor.</h1>
                <p class="subtitle fade-in delay-1">.NET Developer & Back-End Enthusiast.</p>
                <p class="description fade-in delay-2">Crafting clean, modern, and user-centric digital experiences.</p>
                <div class="actions fade-in delay-3">
                    <a href="#dotnet" class="btn primary">Projects</a>
                    <a href="mailto:contato@vitoraltmann.dev" class="btn secondary">Email Me</a>
                    <a href="https://github.com/GatesInDev" target="_blank" class="btn secondary icon-only" aria-label="GitHub">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    </a>
                </div>
            </div>
        </section>
    </template>

    <template id="projects-template">
        <section class="view projects-view">
            <header class="section-header">
                <h2 id="project-section-title">Development</h2>
                <p id="project-section-subtitle">Selected coding projects.</p>
            </header>
            <div class="project-grid" id="dev-grid">
                <!-- Projects injected via JS -->
            </div>
        </section>
    </template>

    <template id="design-template">
        <section class="view design-view">
            <header class="section-header">
                <h2>UI/UX Design</h2>
                <p>Interfaces and experiences.</p>
            </header>
            <div class="project-grid design-grid" id="design-grid">
                <!-- Designs injected via JS -->
            </div>
        </section>
    </template>

    <template id="detail-template">
        <section class="view detail-view">
            <button class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </button>
            <div class="detail-content">
                <!-- Detail content injected here -->
            </div>
        </section>
    </template>

    <!-- Lightbox Overlay -->
    <div id="lightbox" class="lightbox hidden">
        <button id="lightbox-close" class="lightbox-btn close" aria-label="Close">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <button id="lightbox-prev" class="lightbox-btn prev" aria-label="Previous">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button id="lightbox-next" class="lightbox-btn next" aria-label="Next">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Full screen view">
            <div class="lightbox-caption"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
